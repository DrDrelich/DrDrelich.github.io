<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #070401;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    @keyframes pageIn {
      0%   { opacity: 0; transform: scale(1.06); filter: blur(4px); }
      100% { opacity: 1; transform: scale(1);    filter: blur(0px); }
    }
    @keyframes bloomOut {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(2.2); }
    }
    @keyframes chickenSettle {
      0%   { transform: rotate(-2deg) translate(3px, 2px); }
      18%  { transform: rotate(-2.5deg) translate(4px, 2px); }
      40%  { transform: rotate(-1.7deg) translate(3px, 1px); }
      65%  { transform: rotate(-2.1deg) translate(4px, 2px); }
      100% { transform: rotate(-2deg) translate(3px, 2px); }
    }

    .entry-bloom {
      position: fixed;
      left: 50%; top: 60%;
      width: 150vmax; height: 150vmax;
      transform: translate(-50%,-50%) scale(1.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      mix-blend-mode: screen;
      filter: blur(10px);
      background: radial-gradient(circle,
        rgba(196,255,222,0.97) 0%,
        rgba(74,226,150,0.78) 13%,
        rgba(120,210,150,0.5) 26%,
        rgba(245,200,110,0.62) 44%,
        rgba(150,100,40,0.3) 62%,
        rgba(70,52,22,0) 78%
      );
      animation: bloomOut 770ms cubic-bezier(.4,0,.3,1) both;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3vh;
      margin-top: -3vh;
      animation: pageIn 760ms cubic-bezier(.55,.06,.3,1) both;
    }

    .hang-mount {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(46vw, calc(46vh * 1536 / 1024));
      transform: rotate(-2deg) translate(3px, 2px);
      animation: chickenSettle 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    .nail-svg {
      width: 100%;
      height: 100px;
      display: block;
      overflow: visible;
      margin-bottom: -62px;
    }

    .chicken {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 18px 48px rgba(0,0,0,0.7));
    }

    .gold-text {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: clamp(13px, 1.6vw, 22px);
      letter-spacing: 0.06em;
      line-height: 1.3;
      text-align: center;
      background: linear-gradient(180deg, #fef5d5 0%, #f3da97 48%, #d7ac5e 80%, #bd9344 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)) drop-shadow(0 0 12px rgba(240,200,120,0.4));
    }

    .gold-text .spacer { display: block; height: 0.9em; }
  </style>
</head>
<body>
  <canvas id="confetti-canvas" style="
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:300;
  "></canvas>
  <script>
  (function(){
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    const DURATION = 5000;
    const PIECE_COUNT = 120;

    // Golden palette
    const COLORS = [
      '#fef5d5','#f3da97','#d7ac5e','#e8c96a',
      '#c8901a','#f0d060','#ffe49a','#b87c2a',
    ];

    function resize(){
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Each piece: x, y, w, h, rotation, rotSpeed, vx, vy, color, opacity, skewX
    function makePiece(){
      const side = Math.random() < 0.5 ? 'left' : 'right';
      // spawn in outer 30% of screen on each side, slight overlap into centre (up to 42%)
      const xFrac = side === 'left'
        ? Math.random() * 0.42        // 0–42% from left
        : 1 - Math.random() * 0.42;  // 58–100% from left
      return {
        x:        xFrac * canvas.width,
        y:        -20 - Math.random() * canvas.height * 0.4,
        w:        6  + Math.random() * 14,
        h:        3  + Math.random() * 6,
        rot:      Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.18,
        vx:       (Math.random() - 0.5) * 1.4,
        vy:       1.8 + Math.random() * 2.8,
        skewX:    (Math.random() - 0.5) * 0.9,
        color:    COLORS[Math.floor(Math.random() * COLORS.length)],
        opacity:  0.7 + Math.random() * 0.3,
      };
    }

    const pieces = Array.from({length: PIECE_COUNT}, makePiece);

    const start = performance.now();

    function tick(now){
      const elapsed = now - start;
      const progress = Math.min(elapsed / DURATION, 1);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // global fade-out in last 20%
      const globalAlpha = progress > 0.8
        ? 1 - (progress - 0.8) / 0.2
        : 1;

      for(const p of pieces){
        p.x   += p.vx;
        p.y   += p.vy;
        p.rot += p.rotSpeed;
        // gentle gravity + slight wobble
        p.vx  += Math.sin(now * 0.001 + p.y * 0.01) * 0.012;

        ctx.save();
        ctx.globalAlpha = p.opacity * globalAlpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.transform(1, 0, p.skewX, 1, 0, 0);

        // Shiny highlight effect: base rect + lighter strip
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.rect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.fill();

        // specular highlight strip
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(-p.w/2, -p.h/2, p.w * 0.4, p.h);

        ctx.restore();
      }

      if(progress < 1) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(tick);
  })();
  </script>
  <div class="entry-bloom"></div>
  <div class="content">
    <div class="hang-mount">
      <svg class="nail-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ng" cx="36%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#f8ec80"/>
            <stop offset="46%" stop-color="#c8901a"/>
            <stop offset="100%" stop-color="#5c3800"/>
          </radialGradient>
          <radialGradient id="ngs" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
        </defs>
        <!-- shaft going into wall (above viewBox via overflow:visible) -->
        <rect x="97" y="-14" width="6" height="28" rx="2" fill="#906818"/>
        <!-- shadow under head -->
        <ellipse cx="100" cy="21" rx="13" ry="4.5" fill="url(#ngs)"/>
        <!-- nail head -->
        <ellipse cx="100" cy="15" rx="14" ry="8.5" fill="url(#ng)"/>
        <!-- left rope: from nail base → left frame ring -->
        <path d="M 100 23 Q 58 68 20 96" stroke="#8a6020" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- right rope: from nail base → right frame ring -->
        <path d="M 100 23 Q 142 68 180 96" stroke="#8a6020" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- left ring -->
        <ellipse cx="20" cy="96" rx="5.5" ry="3.5" fill="url(#ng)" opacity="0.95"/>
        <!-- right ring -->
        <ellipse cx="180" cy="96" rx="5.5" ry="3.5" fill="url(#ng)" opacity="0.95"/>
      </svg>
      <img class="chicken" src="chicken.png" alt="Roasted chicken">
    </div>
    <p class="gold-text">
      Thanks, John!<br>
      Look for an email from us at destiny@surprise-me.com.<br>
      We'll get back to you within 24 hours.<br>
      <span class="spacer"></span>
      By the way, be careful with the roasted chicken. Just a friendly tip!
    </p>
  </div>
</body>
</html>
