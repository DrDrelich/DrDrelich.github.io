<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIP Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@900&family=Zilla+Slab:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #070401;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .scene {
      position: relative;
      width: min(75vw, calc(75vh * 1672 / 941));
      aspect-ratio: 1672 / 941;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,.8);
      container-type: size;
    }

    .scene img.crowd {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(7,4,1,0.00) 0%,
        rgba(7,4,1,0.00) 70%,
        rgba(7,4,1,0.78) 83%,
        rgba(7,4,1,0.96) 100%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 4% 8% 3%;
      gap: 2cqh;
    }

    .gold-text {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: clamp(10px, 4.2cqh, 26px);
      letter-spacing: 0.06em;
      line-height: 1.3;
      text-align: center;
      background: linear-gradient(180deg, #fef5d5 0%, #f3da97 48%, #d7ac5e 80%, #bd9344 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.7)) drop-shadow(0 0 12px rgba(240,200,120,0.4));
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 1.5cqw;
      width: 100%;
    }

    .email-input {
      flex: 1 1 0;
      height: 54px;
      padding: 0 18px;
      border: 2px solid rgba(202,160,80,0.5);
      border-radius: 3px;
      background: rgba(7,4,1,0.80);
      color: #f3da97;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 220ms ease, box-shadow 220ms ease;
    }

    .email-input:focus {
      border-color: rgba(202,160,80,0.9);
      box-shadow: 0 0 14px rgba(202,160,80,0.3);
    }

    .confirm-btn {
      flex: 1 1 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Zilla Slab', serif;
      font-weight: 700;
      font-size: clamp(12px, 3.2cqh, 18px);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(70,210,140,0.55), 0 1px 2px rgba(0,28,16,0.7);
      background: linear-gradient(180deg, #15694a 0%, #0d4a32 52%, #06301f 100%);
      box-shadow:
        0 0 13px rgba(24,135,88,0.4),
        0 0 28px rgba(24,135,88,0.22),
        0 6px 14px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(110,200,160,0.22),
        inset 0 -4px 9px rgba(0,28,16,0.5);
      transition: opacity 360ms ease, box-shadow 220ms ease, transform 150ms ease, background 220ms ease;
    }

    .confirm-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #1c8059 0%, #115f3f 52%, #0a3d27 100%);
      box-shadow:
        0 0 22px rgba(40,180,118,0.7),
        0 0 48px rgba(40,180,118,0.38),
        0 10px 20px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(140,225,185,0.3),
        inset 0 -4px 9px rgba(0,32,18,0.5);
    }

    .confirm-btn:active {
      transform: translateY(1px) scale(0.99);
      background: linear-gradient(180deg, #15694a 0%, #0d4a32 52%, #06301f 100%);
      box-shadow:
        0 0 14px rgba(24,135,88,0.5),
        0 3px 8px rgba(0,0,0,0.6),
        inset 0 3px 8px rgba(0,30,18,0.6);
    }

    /* page entrance */
    @keyframes sceneIn {
      0%   { opacity: 0; transform: scale(1.06); filter: blur(4px); }
      100% { opacity: 1; transform: scale(1);    filter: blur(0px); }
    }
    @keyframes bloomOut {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(2.2); }
    }

    .scene {
      animation: sceneIn 760ms cubic-bezier(.55,.06,.3,1) both;
    }

    .entry-bloom {
      position: fixed;
      left: 50%; top: 60%;
      width: 150vmax; height: 150vmax;
      transform: translate(-50%,-50%) scale(1.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      mix-blend-mode: screen;
      filter: blur(10px);
      background: radial-gradient(circle,
        rgba(196,255,222,0.97) 0%,
        rgba(74,226,150,0.78) 13%,
        rgba(120,210,150,0.5) 26%,
        rgba(245,200,110,0.62) 44%,
        rgba(150,100,40,0.3) 62%,
        rgba(70,52,22,0) 78%
      );
      animation: bloomOut 770ms cubic-bezier(.4,0,.3,1) both;
    }

    /* exit bloom */
    @keyframes bloomExit {
      0%   { opacity: 0;  transform: translate(-50%,-50%) scale(0.12); }
      38%  { opacity: 1;  transform: translate(-50%,-50%) scale(1.0);  }
      55%  { opacity: 1;  transform: translate(-50%,-50%) scale(1.3);  }
      100% { opacity: 0;  transform: translate(-50%,-50%) scale(2.2);  }
    }
    .exit-bloom {
      display: none;
      position: fixed;
      left: 50%; top: 60%;
      width: 150vmax; height: 150vmax;
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      mix-blend-mode: screen;
      filter: blur(10px);
      background: radial-gradient(circle,
        rgba(196,255,222,0.97) 0%,
        rgba(74,226,150,0.78) 13%,
        rgba(120,210,150,0.5) 26%,
        rgba(245,200,110,0.62) 44%,
        rgba(150,100,40,0.3) 62%,
        rgba(70,52,22,0) 78%
      );
    }
    .exit-bloom.active {
      display: block;
      animation: bloomExit 1200ms cubic-bezier(.4,0,.3,1) forwards;
    }

    /* edge feather */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 6px;
      box-shadow: inset 0 0 44px 10px rgba(5,6,5,.92);
    }
  </style>
</head>
<body>
  <div class="entry-bloom"></div>
  <div class="exit-bloom" id="exitBloom"></div>
  <div class="scene">
    <img class="crowd" src="crowd.png" alt="VIP crowd">
    <div class="overlay">
      <p class="gold-text">
        Great choice, John! You're joining our special VIP group.<br>
        Confirm your email address to receive instructions on the next steps to fulfill your destiny.
      </p>
      <div class="form-row">
        <input class="email-input" type="email" value="john.doe@gmail.com">
        <button class="confirm-btn" id="confirmBtn">Confirm Your E-Mail Address</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('confirmBtn').addEventListener('click', function(e) {
      e.preventDefault();

      // whoosh sound — identical to bundle's _whoosh()
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const master = actx.createGain();
        master.gain.value = 0.7;
        master.connect(actx.destination);

        const t = actx.currentTime;
        const o = actx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(220, t);
        o.frequency.exponentialRampToValueAtTime(1320, t + 0.55);
        const f = actx.createBiquadFilter();
        f.type = 'bandpass'; f.frequency.value = 900; f.Q.value = 0.7;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.16, t + 0.18);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
        o.connect(f).connect(g).connect(master);
        o.start(t); o.stop(t + 0.8);
      } catch(err) {}

      // bloom exit
      document.getElementById('exitBloom').classList.add('active');

      // navigate at bloom peak (430ms)
      setTimeout(function() {
        window.location.href = 'thankyou.html';
      }, 430);
    });
  </script>
</body>
</html>
