<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fintech Dashboards — Case Study — Jacek Waz</title>
  <meta name="description" content="Fintech Dashboards case study by Jacek Waz — enterprise fintech dashboard design." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* =========================================================
       Fintech Dashboards — Case Study — vertical gallery page
       Desktop · Light mode · 1440px design frame scaled to fit
       (mirrors index.html / styles.css so the header never jumps)
       ========================================================= */

    :root{
      --page-bg:      #F2EFEF;
      --card-white:   #FFFFFF;   /* main container colour */
      --card-gray:    #E8E8E8;
      --ink:          #1A1A1A;
      --ink-body:     #484848;
      --border-soft:  #D4D4D4;
      --blue:         #007AFF;
      --radius:       14px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--page-bg);
      font-family:"Inter","Helvetica Neue",Arial,sans-serif;
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;     /* guard against sub-pixel rounding on the scaled frame */
    }

    /* ---------- Responsive scaling (mirrors the homepage) ---------- */
    .stage{ min-height:100vh; }

    /* The wrapper reserves the SCALED size of the frame (so a scaled-down layout
       doesn't leave empty space): width via CSS, height set by fit() in JS.
       Centered on the FULL viewport width (vw includes the scrollbar) so the
       gallery's vertical scrollbar never shifts it vs the non-scrolling homepage.
       50vw - 720px*s == the homepage's (100vw - 1440px*s)/2. */
    .wrap{
      --s:1;
      width:calc(1440px * var(--s));
      margin-top:24px;                        /* homepage stage top padding */
      margin-bottom:24px;                     /* 24px gap at the end of the page */
      margin-left:calc(50vw - 720px * var(--s));
    }

    /* The 1440px design frame: 1382px interface centered inside (29px each side),
       nav band 40px down — identical geometry to the homepage canvas, then scaled
       by --s to fit the viewport. */
    .frame{
      width:1440px;
      padding:40px 29px 0;
      transform:scale(var(--s));
      transform-origin:top left;
    }

    /* ---------- Top navigation bar (gray card, homepage header) ---------- */
    .topnav{
      height:83px;                     /* exact homepage header height (no jump) */
      background:var(--card-gray);     /* gray bar, matches homepage header */
      border-radius:var(--radius);
      padding:16px 26px;
      display:flex;
      justify-content:space-between;   /* intro left · contact right */
      align-items:flex-end;
    }
    .topnav__intro p{ margin:0; line-height:1.11; }
    .topnav__name{ font-size:16px; font-weight:600; color:var(--ink); letter-spacing:.1px; }
    .topnav__role,
    .topnav__tags{ font-size:15px; font-weight:500; color:#2c2c2c; }
    .topnav__contact{ text-align:right; }
    .topnav__line{
      margin:0;
      font-size:14px;
      color:#2c2c2c;
      line-height:1.11;
      white-space:nowrap;
    }
    /* Email / LinkedIn links — identical style + behavior to the homepage */
    .text-link{
      color:#2c2c2c;
      text-decoration:underline;
      text-underline-offset:2px;
      transition:color .18s ease;
    }
    .text-link:hover,
    .text-link:focus-visible{
      color:var(--blue);
      text-decoration:underline;
      outline:none;
    }

    /* ---------- Content panel: title band + gallery as one panel ---------- */
    .content{
      width:100%;                      /* full interface width (1382px) */
      margin-top:24px;                 /* gap below the gray nav bar */
      background:var(--card-white);    /* single panel (no seam inside) */
      border-radius:var(--radius);
      padding:0 24px 24px;             /* 24px sides + bottom; header band supplies the top */
    }

    /* ---------- Header band (title level, inside the panel) ---------- */
    .pagehead{
      height:80px;                     /* 80px header space above the first image */
      display:flex;
      align-items:center;              /* align elements left → right */
    }

    /* Back button — pill with circular arrow + label, links to the homepage */
    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      height:40px;
      padding:0 16px 0 12px;
      border:1px solid var(--border-soft);
      border-radius:10px;
      background:transparent;
      color:var(--ink-body);
      text-decoration:none;
      transition:background-color .18s ease, border-color .18s ease, color .18s ease;
    }
    .back-btn__icon{ display:inline-flex; width:20px; height:20px; flex:0 0 20px; }
    .back-btn__icon svg{ width:20px; height:20px; display:block; }
    .back-btn__icon svg path{
      fill:none;
      stroke:currentColor;
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .back-btn__label{ font-size:15px; font-weight:600; line-height:1; color:inherit; }
    .back-btn:hover{ color:var(--blue); background:#FAFAFA; }
    .back-btn:focus-visible{
      outline:none;
      color:var(--ink-body);
      border-color:var(--blue);
      box-shadow:0 0 0 1px var(--blue);
    }

    /* 24px gap after the back button */
    .pagehead__title{ margin-left:24px; }

    /* Page title */
    .pagehead__title{
      margin-top:0;
      margin-bottom:0;
      font-family:"ADLaM Display", system-ui, sans-serif;
      font-weight:400;
      font-size:24px;
      line-height:1.11;                /* 111% */
      letter-spacing:-0.01em;          /* -1% */
      color:#000000;
      white-space:nowrap;
    }

    /* 8px gap after the page title */
    .pagehead__desc{ margin-left:8px; }

    /* Page description — same family/style as homepage descriptions (Inter) */
    .pagehead__desc{
      margin-top:0;
      margin-bottom:0;
      font-size:14px;
      color:#484848;
      line-height:1.4;
    }

    /* ---------- Vertical image gallery (inside the panel) ---------- */
    .gallery{
      display:flex;
      flex-direction:column;
      gap:8px;                         /* 8px vertical gap between images */
    }
    .gallery__img{
      display:block;
      width:100%;                      /* scale proportionally to the gallery */
      height:auto;
      border-radius:12px;
    }
  </style>
</head>
<body>
  <div class="stage">
   <div class="wrap">
    <div class="frame">

      <!-- ============ TOP NAVIGATION BAR (matches homepage header) ============ -->
      <nav class="topnav" aria-label="Site header">
        <div class="topnav__intro">
          <p class="topnav__name">Jacek Waz, Krakow, Poland, 10yrs+</p>
          <p class="topnav__role">Senior UX/UI Designer&nbsp;&nbsp;|&nbsp;&nbsp;Product Designer</p>
          <p class="topnav__tags">B2B SaaS &amp; Fintech&nbsp;&nbsp;|&nbsp;&nbsp;Payments&nbsp;&nbsp;|&nbsp;&nbsp;Design Systems&nbsp;&nbsp;|&nbsp;&nbsp;Enterprise Dashboards</p>
        </div>
        <div class="topnav__contact">
          <p class="topnav__line">Email:&nbsp;<a class="text-link" href="mailto:prochow@gmail.com">prochow@gmail.com</a></p>
          <p class="topnav__line">LinkedIn:&nbsp;<a class="text-link" href="https://www.linkedin.com/in/jacek-waz-77a4801/" target="_blank" rel="noopener noreferrer">https://www.linkedin.com/in/jacek-waz-77a4801/</a></p>
        </div>
      </nav>

      <!-- ============ PANEL: HEADER + GALLERY (one continuous panel) ============ -->
      <main class="content">

        <!-- Header band (title level) -->
        <header class="pagehead">
          <a class="back-btn" href="index.html" aria-label="Back to homepage">
            <span class="back-btn__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13.5 8.5 10 12l3.5 3.5M10 12h6M21 12a9 9 0 1 0-18 0 9 9 0 0 0 18 0Z" />
              </svg>
            </span>
            <span class="back-btn__label">Back</span>
          </a>
          <h1 class="pagehead__title">FINTECH DASHBOARDS</h1>
          <p class="pagehead__desc">Case Study</p>
        </header>

        <!-- Vertical image gallery -->
        <div class="gallery" id="gallery" aria-label="Fintech Dashboards case study gallery">
          <!-- Images are injected here by the script below -->
        </div>

      </main>

    </div>
   </div>
  </div>

  <script>
    /* -----------------------------------------------------------------
       Gallery images.
       The images live in the local folder "FINTECH DASHBOARDS CASE STUDY".
       Browsers can't list a directory, so the filenames are defined here.
       They are rendered sequentially by numeric filename.
       --> To add/remove images, just edit the IMAGES array below. <--
    ----------------------------------------------------------------- */
    var IMAGE_DIR = './FINTECH DASHBOARDS CASE STUDY/';

    var IMAGES = [
      '2.png',
      '3.png',
      '4.png',
      '5.png',
      '6.png',
      '7.png'
    ];

    /* -----------------------------------------------------------------
       Responsive scaling — mirrors the homepage's fit() exactly so the
       shared gray header bar sits at the identical position and size on
       both pages at every viewport size. A 1440px design frame is scaled
       by s = min(availW/1440, availH/837, 1); the wrapper is sized to the
       SCALED frame (width via CSS, height here) and the tall gallery
       scrolls vertically below.
    ----------------------------------------------------------------- */
    var fit = (function(){
      var DESIGN_W = 1440, DESIGN_H = 837, MARGIN = 24;
      var wrap = document.querySelector('.wrap');
      var frame = document.querySelector('.frame');
      return function fit(){
        var availW = window.innerWidth  - MARGIN * 2;
        var availH = window.innerHeight - MARGIN * 2 - 1;
        var s = Math.min(availW / DESIGN_W, availH / DESIGN_H, 1);
        wrap.style.setProperty('--s', s);
        wrap.style.width  = (DESIGN_W * s) + 'px';
        wrap.style.height = (frame.offsetHeight * s) + 'px';  // reserve scaled height
      };
    })();

    (function renderGallery(){
      var gallery = document.getElementById('gallery');
      var frag = document.createDocumentFragment();

      IMAGES.forEach(function (file, i){
        var img = document.createElement('img');
        img.className = 'gallery__img';
        img.src = IMAGE_DIR + file;
        img.alt = 'Fintech Dashboards case study — image ' + (i + 1);
        img.decoding = 'async';
        // Each image grows the frame height, so re-fit once it has loaded.
        img.addEventListener('load', fit);
        frag.appendChild(img);
      });

      gallery.appendChild(frag);
    })();

    fit();
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
  </script>
</body>
</html>
